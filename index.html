    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: beige;
            --secondary: #9B4DE0;
            --background: #0a0a0a;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: var(--background);
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        /* ── Background ── */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 0;
            background-color: var(--background);
        }

        .background-image-wrapper {
            position: absolute;
            inset: 0;
        }

        /* Images sit at z-index 1, overlay at z-index 2 */
        .background-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .background-image.active {
            opacity: 1;
        }

        .background-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 10, 0.55);
            z-index: 2;
            pointer-events: none;
        }

        /* ── Layout ── */
        .container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .content-wrapper {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* ── Links grid ── */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            width: 100%;
        }

        .links-section {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.7);
            position: relative;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 1rem;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), transparent);
        }

        @media (max-width: 768px) {
            .links-grid {
                grid-template-columns: 1fr;
            }

            .content-wrapper {
                padding: 1.5rem;
                margin: 1rem;
            }
        }

        /* ── Social links ── */
        .social-link {
            position: relative;
            padding: 0.8rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: grid;
            grid-template-columns: 24px 1fr;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
            text-align: left;
            animation: fadeInUp 0.6s ease backwards;
        }

        .social-link i {
            width: 24px;
            text-align: center;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .social-link span {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 500;
            letter-spacing: 0.5px;
            z-index: 1;
        }

        .social-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            transform: translateX(-100%);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .social-link:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2), 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .social-link:hover::before {
            transform: translateX(0);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Signature ── */
        .signature-img {
            max-width: 500px;
            width: 100%;
            height: auto;
            margin: -2rem auto -2.5rem;
            filter: drop-shadow(0 0 10px rgba(255, 105, 180, 0.3));
            position: relative;
            z-index: 3;
        }

        /* ── Butterflies ── */
        .butterfly {
            position: fixed;
            width: 45px;
            height: 30px;
            z-index: 10;
            pointer-events: none;
            animation: floatPath 40s linear;
        }

        .butterfly img {
            width: 100%;
            height: 100%;
            transform-origin: center;
            animation: flapWings 0.9s ease-in-out infinite;
        }

        @keyframes flapWings {
            0% {
                transform: rotate(-90deg) scaleY(1);
            }

            50% {
                transform: rotate(-90deg) scaleY(0.5);
            }

            100% {
                transform: rotate(-90deg) scaleY(1);
            }
        }

        @keyframes floatPath {
            0% {
                transform: translate(-50px, 0) rotate(0deg) scale(1);
            }

            25% {
                transform: translate(calc(25vw), 10vh) rotate(-5deg) scale(0.9);
            }

            50% {
                transform: translate(calc(50vw), -5vh) rotate(8deg) scale(1.1);
            }

            75% {
                transform: translate(calc(75vw), 15vh) rotate(-10deg) scale(0.95);
            }

            100% {
                transform: translate(calc(100vw + 50px), 5vh) rotate(5deg) scale(1);
            }
        }
    </style>

    <script>
        const random = (min, max) => min + Math.random() * (max - min);

        const createElement = (tag, attrs = {}) => {
            const el = document.createElement(tag);
            Object.entries(attrs).forEach(([k, v]) => { el[k] = v; });
            return el;
        };

        // ── Background slideshow ──────────────────────────────────────────────────
        const initializeBackgroundImages = () => {
            const urls = [
                'img/reel/1000008582.jpg',
                'img/reel/CanaKittyBackgroundWallpaper.png',
                'img/reel/Canaria_1.png',
                'img/reel/skeb_by_qum.png'
            ];

            const wrapper = document.querySelector('.background-image-wrapper');
            let currentIndex = 0;

            // Build <img> elements immediately so the browser can start loading them
            const imgs = urls.map(url => {
                const img = document.createElement('img');
                img.className = 'background-image';
                img.alt = '';
                img.src = url;
                wrapper.appendChild(img);
                return img;
            });

            // Show a specific slide
            const show = (index) => {
                imgs.forEach((img, i) => img.classList.toggle('active', i === index));
            };

            // Show first image as soon as it has loaded (or immediately if cached)
            if (imgs[0].complete) {
                show(0);
            } else {
                imgs[0].addEventListener('load', () => show(0), { once: true });
            }

            // Rotate every 8 s
            setInterval(() => {
                currentIndex = (currentIndex + 1) % imgs.length;
                show(currentIndex);
            }, 8000);
        };

        // ── Butterflies ───────────────────────────────────────────────────────────
        const createButterfly = () => {
            const butterfly = createElement('div', { className: 'butterfly' });
            const img = createElement('img', { src: 'img/butterfly-static.svg', alt: '' });
            const size = random(15, 30);
            Object.assign(butterfly.style, {
                top: `${random(0, window.innerHeight * 0.8)}px`,
                width: `${size}px`,
                height: `${size * 1.5}px`,
                animationDuration: `${random(35, 60)}s`
            });
            img.style.filter = `hue-rotate(${random(0, 360)}deg)`;
            butterfly.appendChild(img);
            document.body.appendChild(butterfly);
            butterfly.addEventListener('animationend', () => butterfly.remove(), { once: true });
        };

        const initializeButterflySystem = () => {
            // Stagger the first three
            for (let i = 0; i < 3; i++) setTimeout(createButterfly, i * 2000);
            // Keep spawning randomly
            setInterval(() => { if (Math.random() > 0.5) createButterfly(); }, 4000);
        };

        // ── Heart trail ───────────────────────────────────────────────────────────
        const initializeHeartTrail = () => {
            // Inject styles once
            const style = document.createElement('style');
            style.textContent = `
            .heart-particle {
                position: fixed;
                pointer-events: none;
                z-index: 1000;
                font-size: 12px;
                animation: heart-float 1.2s ease-out forwards;
            }
            @keyframes heart-float {
                0%   { transform: translate(0,0) scale(1); opacity: 1; }
                100% { transform: translate(0,-40px) scale(0); opacity: 0; }
            }
        `;
            document.head.appendChild(style);

            const pool = ['❤️', '💖', '💗', '💓', '💝'];
            let lastX = 0, lastY = 0, lastTime = 0, active = 0;

            document.addEventListener('mousemove', (e) => {
                const now = Date.now();
                if (now - lastTime < 50 || active >= 50) return;
                const dx = e.clientX - lastX, dy = e.clientY - lastY;
                if (Math.hypot(dx, dy) < 5) return;

                lastX = e.clientX; lastY = e.clientY; lastTime = now;
                active++;

                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.textContent = pool[Math.floor(random(0, pool.length))];
                heart.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;`;
                document.body.appendChild(heart);
                heart.addEventListener('animationend', () => { heart.remove(); active--; }, { once: true });
            }, { passive: true });
        };

        // ── Boot ─────────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            initializeBackgroundImages();
            initializeButterflySystem();
            initializeHeartTrail();
        });
    </script>

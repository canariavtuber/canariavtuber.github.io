<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cana's Wheel</title>
    <link rel="icon" href="img/favicon.png" />
    <!-- Preload critical images -->
    <link rel="preload" as="image" href="img/spin/spin-1.png" />
    <link rel="preload" as="image" href="img/spin/spin-hover.png" />
    <link rel="preload" as="image" href="img/favicon.png" />
    <style>
        /* =================================================================
           RESET & TOKENS
           ================================================================= */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #fce4ec;
            --surface:  #f8bbd0;
            --surface2: #e1bee7;
            --surface3: #f0bbdd;
            --accent:   #e91e63;
            --accent-h: #c2185b;
            --green:    #66bb6a;
            --text:     #2e2e3a;
            --muted:    #8e7b8e;
            --border:   rgba(255,255,255,.08);
            --radius:   10px;
            --shadow:   0 8px 32px rgba(0,0,0,.5);
        }

        html { overflow-x: hidden; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Shared focus/placeholder for text-like inputs */
        input:focus, select:focus { border-color: var(--accent); }
        input::placeholder { color: var(--muted); }

        /* =================================================================
           BACKGROUND IMAGE SLIDESHOW
           ================================================================= */
        .background-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            overflow: hidden;
            z-index: 0;
        }

        .background-image-wrapper {
            position: absolute;
            width: 130%; height: 130%;
            top: -15%; left: -15%;
            transform-style: preserve-3d;
            transform: scale(1.1);
            transition: transform 0.3s ease-out;
            overflow: hidden;
        }

        .background-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(252,228,236,.7), rgba(252,228,236,.6));
            z-index: 2;
        }

        .background-image {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            will-change: opacity;
        }
        .background-image.active { opacity: 1; }

        /* =================================================================
           BUTTERFLY STYLES
           ================================================================= */
        .butterfly {
            position: fixed;
            left: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.5;
            animation: floatPath 40s linear;
            will-change: transform;
            contain: layout style;
        }

        .butterfly img {
            width: 100%; height: 100%;
            animation: flapWings 0.9s ease-in-out infinite;
            transform: rotate(-90deg);
        }

        @keyframes flapWings {
            0%, 100% { transform: rotate(-90deg) scaleY(1); }
            50%      { transform: rotate(-90deg) scaleY(0.5); }
        }

        @keyframes floatPath {
            0%   { transform: translate(-50px, 0) rotate(0deg) scale(1); }
            25%  { transform: translate(25vw, 10vh) rotate(-5deg) scale(0.9); }
            50%  { transform: translate(50vw, -5vh) rotate(8deg) scale(1.1); }
            75%  { transform: translate(75vw, 15vh) rotate(-10deg) scale(0.95); }
            100% { transform: translate(calc(100vw + 50px), 5vh) rotate(5deg) scale(1); }
        }

        /* =================================================================
           UI ELEMENTS
           ================================================================= */
        header {
            position: relative;
            z-index: 10;
            width: 100%;
            background: var(--surface);
            padding: 12px 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,.4);
            flex-shrink: 0;
        }
        header h1 { font-size: 1.4rem; font-weight: 800; }
        header h1 em { color: var(--accent); font-style: normal; }

        .page {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 980px;
            padding: 28px 16px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        .wheel-row {
            display: flex;
            align-items: center;
            gap: 96px;
        }

        .wheel-wrap {
            position: relative;
            width: 440px; height: 440px;
            flex-shrink: 0;
            will-change: transform;
        }

        #wheelCanvas {
            display: block;
            border-radius: 50%;
            filter: drop-shadow(0 0 22px rgba(233,69,96,.4));
        }

        .pointer {
            position: absolute;
            top: -14px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 32px solid var(--accent);
            filter: drop-shadow(0 2px 6px rgba(233,69,96,.8));
            z-index: 5;
        }

        .spin-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #spinBtn {
            width: 350px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transition: transform .15s, filter .15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #spinBtn img {
            width: 100%; height: 100%;
            border-radius: 5%;
            object-fit: cover;
            display: block;
        }
        #spinBtn:hover { transform: scale(1.08); filter: brightness(1.15); }
        #spinBtn:active { transform: scale(.92); }
        #spinBtn:disabled { opacity: .8; cursor: not-allowed; transform: none; filter: none; }

        .spin-hint {
            font-size: .68rem;
            color: var(--muted);
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        /* =================================================================
           TABBED PANEL
           ================================================================= */
        .panel {
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 13px 8px;
            background: none;
            border: none;
            color: var(--muted);
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: .4px;
            transition: color .15s, background .15s;
            border-bottom: 3px solid transparent;
            margin-bottom: -1px;
        }
        .tab-btn:hover { color: var(--text); background: rgba(255,255,255,.03); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-btn:disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }

        .tab-pane { display: none; padding: 20px; }
        .tab-pane.active { display: block; }

        /* ── Entry Sets ─────────────────────────────────────────── */
        .sets-section {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 16px;
        }
        .sets-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .sets-section-header h4 {
            font-size: .75rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .8px;
        }
        .sets-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .sets-controls input[type="text"] {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            color: var(--text);
            font-size: .82rem;
            outline: none;
            width: 160px;
            transition: border-color .15s;
        }

        .sets-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .set-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 10px 4px 12px;
            font-size: .8rem;
            cursor: default;
            transition: border-color .15s;
        }
        .set-chip-name { cursor: pointer; }
        .set-chip-name:hover { text-decoration: underline; }
        .set-chip-del {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: .85rem;
            padding: 0 2px;
            line-height: 1;
            transition: color .12s;
        }
        .set-chip-del:hover { color: var(--accent); }
        .sets-empty { font-size: .8rem; color: var(--muted); padding: 4px 0; }

        /* ── Entries toolbar ─────────────────────────────────────── */
        .entries-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .entries-toolbar input[type="text"] {
            flex: 1;
            min-width: 140px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-size: .9rem;
            outline: none;
            transition: border-color .15s;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: .85rem;
            font-weight: 600;
            
            cursor: pointer;
            transition: background .15s, color .15s;
            white-space: nowrap;
        }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { background: var(--accent-h); }
        .btn-surface { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-surface:hover { color: var(--accent); background: #f3d0e3; }
        .btn-danger { background: #f8d0d0; color: #c62828; border: 1px solid #e8a0a0; }
        .btn-danger:hover { background: #f0b0b0; color: #b71c1c; }
        .btn:disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }

        /* Entry list */
        #entryList {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--surface2) transparent;
            margin-bottom: 12px;
        }

        .entry-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface2);
            border-radius: 8px;
            padding: 6px 10px;
            transition: background .15s, opacity .2s;
        }
        .entry-row:hover { background: var(--surface3); }
        .entry-row.disabled-entry { opacity: .45; }
        .entry-row.disabled-entry .entry-label-input {
            text-decoration: line-through;
            color: var(--muted);
        }

        .entry-toggle {
            flex-shrink: 0;
            width: 16px; height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .swatch {
            width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,.2);
            cursor: pointer;
            flex-shrink: 0;
            transition: border-color .15s;
        }
        .swatch:hover { border-color: #fff; }
        .swatch-wrap { position: relative; flex-shrink: 0; }
        .swatch-wrap input[type="color"] {
            position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;
        }

        .entry-label-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid transparent;
            color: var(--text);
            font-size: .88rem;
            outline: none;
            padding: 2px 4px;
            min-width: 0;
            transition: border-color .15s;
        }
        .entry-label-input:focus { border-bottom-color: var(--accent); }

        .weight-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .weight-wrap label { font-size: .72rem; color: var(--muted); }
        .weight-input {
            width: 46px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 6px;
            color: var(--text);
            font-size: .82rem;
            outline: none;
            text-align: center;
        }

        .entry-del {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 2px 5px;
            border-radius: 4px;
            line-height: 1;
            transition: color .12s;
            flex-shrink: 0;
        }
        .entry-del:hover { color: var(--accent); }

        .entry-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        /* ── Results tab ────────────────────────────────────────── */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .results-header h3 { font-size: .95rem; color: var(--muted); font-weight: 600; }

        #resultLog {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 360px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--surface2) transparent;
        }

        .log-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface2);
            border-radius: 8px;
            padding: 8px 12px;
            animation: slideIn .2s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: none; }
        }
        .log-num { font-size: .72rem; color: var(--muted); min-width: 22px; }
        .log-swatch { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .log-label { flex: 1; font-size: .9rem; }
        .log-time { font-size: .72rem; color: var(--muted); }

        .empty-msg { color: var(--muted); font-size: .9rem; text-align: center; padding: 24px; }

        /* ── Settings tab ───────────────────────────────────────── */
        .setting-group { margin-bottom: 20px; }
        .setting-group h3 {
            font-size: .78rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: 10px;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }
        .setting-row label { font-size: .88rem; }
        .setting-row input[type="number"],
        .setting-row select {
            width: 90px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            color: var(--text);
            font-size: .88rem;
            outline: none;
        }

        .toggle {
            position: relative;
            width: 40px; height: 22px;
            display: inline-block;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0;
            background: var(--surface2);
            border-radius: 22px;
            cursor: pointer;
            transition: background .2s;
            border: 1px solid var(--border);
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 16px; height: 16px;
            left: 3px; top: 2px;
            background: var(--muted);
            border-radius: 50%;
            transition: transform .2s, background .2s;
        }
        .toggle input:checked + .toggle-slider { background: var(--accent); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: #fff; }

        /* =================================================================
           MODALS (shared)
           ================================================================= */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.6);
            backdrop-filter: blur(5px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal-box {
            background: var(--surface);
            border-radius: 18px;
            padding: 36px 44px;
            text-align: center;
            box-shadow: 0 12px 48px rgba(0,0,0,.65);
            max-width: 340px;
            width: 92%;
            animation: popIn .22s cubic-bezier(.175,.885,.32,1.275);
        }
        @keyframes popIn {
            from { transform: scale(.7); opacity: 0; }
            to   { transform: scale(1);  opacity: 1; }
        }

        .modal-confetti { font-size: 2.6rem; margin-bottom: 8px; }
        .modal-eyebrow { font-size: .78rem; color: var(--muted); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 6px; }
        .modal-winner { font-size: 2.1rem; font-weight: 800; color: var(--accent); margin-bottom: 6px; word-break: break-word; }
        .modal-swatch { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-bottom: 20px; vertical-align: middle; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions .btn { flex: 1; }

        /* ── Share modal extras ──────────────────────────────── */
        .share-description {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
            word-break: break-word;
        }
        .share-url-wrapper {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .share-url-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            color: var(--text);
            font-size: .82rem;
            outline: none;
            min-width: 0;
            word-break: break-all;
        }
        .share-copied-msg {
            font-size: .78rem;
            color: var(--green);
            margin-top: 6px;
            min-height: 1.2em;
        }
        .share-actions { margin-top: 12px; }

        @media (max-width: 640px) {
            .wheel-wrap { width: 300px; height: 300px; }
            .panel { border-radius: 0; }
        }
    </style>
</head>
<body>

<!-- Background image slideshow -->
<div class="background-container">
    <div class="background-image-wrapper">
        <div class="background-overlay"></div>
    </div>
</div>

<header>
    <img src="img/favicon.png" width="16" height="16" alt="" />
    <h1>Cana's <em>Wheel</em></h1>
</header>

<div class="page">

    <div class="wheel-row">
        <div class="wheel-wrap">
            <canvas id="wheelCanvas" width="440" height="440"></canvas>
            <div class="pointer"></div>
        </div>
        <div class="spin-col">
            <button id="spinBtn" title="Spin (Ctrl+Enter)">
                <img src="img/spin/spin-1.png" alt="Spin" />
            </button>
            <span class="spin-hint">Ctrl+↵</span>
        </div>
    </div>

    <div class="panel">
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="entries">Entries</button>
            <button class="tab-btn" data-tab="results">Results</button>
            <button class="tab-btn" data-tab="settings">Settings</button>
        </div>

        <!-- Entries Tab -->
        <div class="tab-pane active" id="tab-entries">
            <div class="sets-section">
                <div class="sets-section-header">
                    <h4>📂 Saved Wheels</h4>
                    <div class="sets-controls">
                        <input id="setNameInput" type="text" placeholder="Wheel name…" maxlength="40" />
                        <button class="btn btn-accent" id="saveSetBtn">💾 Save</button>
                    </div>
                </div>
                <div class="sets-list" id="setsList">
                    <span class="sets-empty" id="setsEmpty">No saved sets yet.</span>
                </div>
            </div>

            <div class="entries-toolbar">
                <input id="newLabel" type="text" placeholder="Type an entry and press Enter…" maxlength="80" />
                <button class="btn btn-accent" id="addBtn">+ Add</button>
            </div>

            <ul id="entryList"></ul>

            <div class="entry-actions">
                <button class="btn btn-surface" id="shuffleBtn">🔀 Shuffle</button>
                <button class="btn btn-surface" id="sortBtn">🔤 Sort A–Z</button>
                <button class="btn btn-surface" id="enableAllBtn">✅ Enable All</button>
                <button class="btn btn-danger"  id="clearBtn">🗑 Clear All</button>
                <button class="btn btn-accent"  id="shareBtn">🔗 Share</button>
            </div>
        </div>

        <!-- Results Tab -->
        <div class="tab-pane" id="tab-results">
            <div class="results-header">
                <h3>Win history</h3>
                <button class="btn btn-danger" id="clearLogBtn">Clear log</button>
            </div>
            <ul id="resultLog">
                <li class="empty-msg" id="logEmpty">No results yet — spin the wheel!</li>
            </ul>
        </div>

        <!-- Settings Tab -->
        <div class="tab-pane" id="tab-settings">
            <div class="setting-group">
                <h3>Spin behaviour</h3>
                <div class="setting-row">
                    <label>Spin duration (seconds)</label>
                    <input type="number" id="cfg-duration" min="1" max="30" value="10" />
                </div>
                <div class="setting-row">
                    <label>After spin action</label>
                    <select id="cfg-action">
                        <option value="none">Do nothing</option>
                        <option value="disable">Disable winner</option>
                        <option value="remove">Remove winner</option>
                        <option value="flag">Highlight winner</option>
                    </select>
                </div>
            </div>

            <div class="setting-group">
                <h3>Wheel appearance</h3>
                <div class="setting-row">
                    <label>Show labels on wheel</label>
                    <label class="toggle">
                        <input type="checkbox" id="cfg-labels" checked />
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <label>Wheel size (px)</label>
                    <input type="number" id="cfg-wheelsize" min="100" max="800" step="10" value="440" />
                </div>
            </div>

            <div class="setting-group">
                <h3>Sound</h3>
                <div class="setting-row">
                    <label>Tick sound while spinning</label>
                    <label class="toggle">
                        <input type="checkbox" id="cfg-tick" checked />
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <label>Tick volume</label>
                    <input type="number" id="cfg-tick-vol" min="0" max="100" step="5" value="5" />
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Winner modal -->
<div id="modal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-box">
        <div class="modal-confetti">🎉</div>
        <div class="modal-eyebrow">The wheel chose…</div>
        <div class="modal-winner" id="modalWinner"></div>
        <span class="modal-swatch" id="modalSwatch"></span>
        <div class="modal-actions">
            <button class="btn btn-surface" id="modalClose">Close</button>
            <button class="btn btn-accent"  id="modalSpin">Spin Again</button>
        </div>
    </div>
</div>

<!-- Share modal -->
<div id="shareModal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-box">

        <div class="share-url-wrapper">
            <input type="text" class="share-url-input" id="shareUrlInput" readonly />
            <button class="btn btn-accent" id="copyShareBtn">📋 Copy</button>
        </div>
        <div class="share-copied-msg" id="shareCopiedMsg"></div>
        <div class="modal-actions share-actions">
            <button class="btn btn-surface" id="shareModalClose">Close</button>
        </div>
    </div>
</div>

<script>
    /* ================================================================
       CONSTANTS
       ================================================================ */
    const SPIN_IMG_DEFAULT = 'img/spin/spin-1.png';
    const SPIN_IMG_HOVER   = 'img/spin/spin-hover.png';
    const SPIN_IMG_SMASH   = 'img/spin/spin-smash.gif';
    const TWO_PI           = Math.PI * 2;
    const HALF_PI_NEG      = -Math.PI / 2;

    const PALETTE = [
        '#f2a0a0', '#f2c4a0', '#f5e0a0', '#a8dbb8',
        '#a0d4cb', '#a8c8e8', '#c9a8e0', '#e8a0c8',
        '#f2b0a0', '#a0d8e0', '#c4dba0', '#f2c8a0',
    ];

    const LS_ENTRIES = 'pickerWheel_entries';
    const LS_SETS    = 'pickerWheel_sets';
    const LS_CFG     = 'pickerWheel_cfg';
    const LS_NEXT_ID = 'pickerWheel_nextId';

    // Preload spin images
    [SPIN_IMG_HOVER, SPIN_IMG_SMASH].forEach(src => { new Image().src = src; });

    const buttonClickSound = new Audio('sound/button.mp3');

    /* ================================================================
       UTILITIES
       ================================================================ */
    const $ = id => document.getElementById(id);
    const $$ = sel => document.querySelectorAll(sel);

    function debounce(fn, ms) {
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => fn(...args), ms);
        };
    }

    function el(tag, attrs = {}, children = []) {
        const node = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
            if (k === 'className')      node.className = v;
            else if (k === 'textContent') node.textContent = v;
            else if (k.startsWith('on')) node.addEventListener(k.slice(2), v);
            else if (k === 'style' && typeof v === 'object')
                Object.assign(node.style, v);
            else node[k] = v;
        }
        for (const c of children) node.appendChild(c);
        return node;
    }

    /* ================================================================
       STATE
       ================================================================ */
    let nextId = 1;

    function mkEntry(label, color, weight = 1, disabled = false) {
        return { id: nextId++, label, color, weight: Math.max(1, weight), disabled };
    }

    const state = {
        entries:      [],
        rotation:     HALF_PI_NEG,
        spinning:     false,
        logCount:     0,
        lastWinnerId: null,
        cfg: {
            duration:   8,
            action:     'none',
            showLabels: true,
            wheelSize:  600,
            tickSound:  true,
            tickVolume: 0.1,
        },
    };

    /* ── Entry cache ─────────────────────────────────────────────── */
    let _cachedActive = null;
    let _cachedSlices = null;
    let _entriesDirty = true;

    function invalidateEntryCache() {
        _entriesDirty = true;
        _cachedActive = null;
        _cachedSlices = null;
    }

    function activeEntries() {
        if (_entriesDirty || !_cachedActive) {
            _cachedActive = state.entries.filter(e => !e.disabled);
        }
        return _cachedActive;
    }

    function buildSlices() {
        if (!_entriesDirty && _cachedSlices) return _cachedSlices;

        const active = activeEntries();
        const tw = active.reduce((s, e) => s + e.weight, 0);
        const slices = [];
        let angle = HALF_PI_NEG;

        for (const entry of active) {
            const arc = (entry.weight / tw) * TWO_PI;
            slices.push({ entry, startAngle: angle, endAngle: angle + arc, midAngle: angle + arc / 2 });
            angle += arc;
        }

        _cachedSlices = slices;
        _entriesDirty = false;
        return slices;
    }

    /* ── Color helper ────────────────────────────────────────────── */
    const _lightenCache = Object.create(null);

    function lighten(hex) {
        if (_lightenCache[hex]) return _lightenCache[hex];
        const n = parseInt(hex.slice(1), 16);
        const r = Math.min(255, ((n >> 16) & 0xff) + 60);
        const g = Math.min(255, ((n >>  8) & 0xff) + 60);
        const b = Math.min(255,  (n        & 0xff) + 60);
        return (_lightenCache[hex] = `rgb(${r},${g},${b})`);
    }

    /* ================================================================
       TICK SOUND (Web Audio API)
       ================================================================ */
    let audioCtx = null, tickBuffer = null;

    function ensureAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    function resumeAudio() {
        const ctx = ensureAudioCtx();
        return ctx.state === 'suspended' ? ctx.resume() : Promise.resolve();
    }

    function ensureTickBuffer() {
        if (tickBuffer) return tickBuffer;
        const ctx  = ensureAudioCtx();
        const len  = Math.ceil(ctx.sampleRate * 0.05);
        const buf  = ctx.createBuffer(1, len, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
        return (tickBuffer = buf);
    }

    function playTick() {
        if (!state.cfg.tickSound) return;
        const ctx = ensureAudioCtx();
        if (ctx.state !== 'running') return;

        const now = ctx.currentTime;
        const vol = state.cfg.tickVolume;

        const noise  = ctx.createBufferSource();
        noise.buffer = ensureTickBuffer();
        const bp           = ctx.createBiquadFilter();
        bp.type            = 'bandpass';
        bp.frequency.value = 5000;
        bp.Q.value         = 0.6;
        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(vol * 0.8, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.035);
        noise.connect(bp).connect(noiseGain).connect(ctx.destination);

        const osc = ctx.createOscillator();
        osc.type  = 'sine';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.025);
        const oscGain = ctx.createGain();
        oscGain.gain.setValueAtTime(vol * 0.5, now);
        oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
        osc.connect(oscGain).connect(ctx.destination);

        noise.start(now); noise.stop(now + 0.045);
        osc.start(now);   osc.stop(now + 0.04);
    }

    /* ================================================================
       PERSISTENCE
       ================================================================ */
    function serializeEntries(entries) {
        return entries.map(({ id, label, color, weight, disabled }) => ({ id, label, color, weight, disabled }));
    }

    function deserializeEntries(arr) {
        return arr.map(e => ({
            id:       e.id,
            label:    e.label,
            color:    e.color,
            weight:   e.weight ?? 1,
            disabled: e.disabled ?? false,
        }));
    }

    function saveEntries() {
        localStorage.setItem(LS_ENTRIES, JSON.stringify(serializeEntries(state.entries)));
        localStorage.setItem(LS_NEXT_ID, String(nextId));
        invalidateEntryCache();
    }

    const debouncedSaveEntries = debounce(saveEntries, 300);

    function loadEntries() {
        try {
            const raw = localStorage.getItem(LS_ENTRIES);
            if (!raw) return false;
            const savedNextId = parseInt(localStorage.getItem(LS_NEXT_ID) || '1', 10);
            nextId = savedNextId;
            state.entries = deserializeEntries(JSON.parse(raw));
            invalidateEntryCache();
            return true;
        } catch { return false; }
    }

    function saveCfg() {
        const { duration, action, showLabels, wheelSize, tickSound, tickVolume } = state.cfg;
        localStorage.setItem(LS_CFG, JSON.stringify({ duration, action, showLabels, wheelSize, tickSound, tickVolume }));
    }

    function loadCfg() {
        try {
            const c = JSON.parse(localStorage.getItem(LS_CFG));
            if (!c) return;
            if (c.duration)  state.cfg.duration  = c.duration;
            if (c.action)    state.cfg.action    = c.action;
            if (c.wheelSize) state.cfg.wheelSize = c.wheelSize;
            if (typeof c.showLabels === 'boolean') state.cfg.showLabels = c.showLabels;
            if (typeof c.tickSound  === 'boolean') state.cfg.tickSound  = c.tickSound;
            if (typeof c.tickVolume === 'number')  state.cfg.tickVolume = c.tickVolume;
        } catch { /* ignore */ }
    }

    /* ── Sets ─────────────────────────────────────────────────────── */
    function loadSetsMap() {
        try { return JSON.parse(localStorage.getItem(LS_SETS)) || {}; }
        catch { return {}; }
    }

    function saveSetsMap(map) { localStorage.setItem(LS_SETS, JSON.stringify(map)); }

    function saveSet(name) {
        if (!name.trim()) return;
        const map = loadSetsMap();
        map[name.trim()] = serializeEntries(state.entries);
        saveSetsMap(map);
        renderSets();
    }

    function loadSet(name) {
        const arr = loadSetsMap()[name];
        if (!arr) return;
        state.entries = deserializeEntries(arr);
        const maxId = state.entries.reduce((m, e) => Math.max(m, e.id), 0);
        if (maxId >= nextId) nextId = maxId + 1;
        invalidateEntryCache();
        saveEntries();
        renderList();
        renderSets();
    }

    function deleteSet(name) {
        const map = loadSetsMap();
        delete map[name];
        saveSetsMap(map);
        renderSets();
    }

    /* ================================================================
       DOM REFERENCES
       ================================================================ */
    const canvas      = $('wheelCanvas');
    const ctx         = canvas.getContext('2d');
    const spinBtn     = $('spinBtn');
    const spinBtnImg  = spinBtn.querySelector('img');
    const entryListEl = $('entryList');
    const resultLogEl = $('resultLog');
    const modalEl     = $('modal');
    const modalWinner = $('modalWinner');
    const modalSwatch = $('modalSwatch');
    const setsListEl  = $('setsList');
    const setsEmptyEl = $('setsEmpty');
    const setNameInput = $('setNameInput');
    const newLabelInput = $('newLabel');
    const shareModalEl   = $('shareModal');
    const shareUrlInput  = $('shareUrlInput');
    const shareCopiedMsg = $('shareCopiedMsg');

    /* ================================================================
       SPIN BUTTON IMAGE HELPERS
       ================================================================ */
    function setSpinBtnSmash() {
        spinBtnImg.src = SPIN_IMG_SMASH + '?t=' + Date.now();
        spinBtnImg.onmouseenter = null;
        spinBtnImg.onmouseleave = null;
    }

    function resetSpinBtnImage() {
        spinBtnImg.src = spinBtn.matches(':hover') ? SPIN_IMG_HOVER : SPIN_IMG_DEFAULT;
        spinBtnImg.onmouseenter = () => { if (!state.spinning) spinBtnImg.src = SPIN_IMG_HOVER; };
        spinBtnImg.onmouseleave = () => { if (!state.spinning) spinBtnImg.src = SPIN_IMG_DEFAULT; };
    }

    resetSpinBtnImage();

    /* ================================================================
               UI LOCK DURING SPIN
       ================================================================ */
    function setUILocked(locked) {
        // All .btn buttons in the panel
        $$('.panel .btn').forEach(b => b.disabled = locked);
        // Entry action buttons
        $$('.entry-del').forEach(b => b.disabled = locked);
        $$('.entry-toggle').forEach(b => b.disabled = locked);
        $$('.entry-label-input').forEach(b => b.disabled = locked);
        $$('.weight-input').forEach(b => b.disabled = locked);
        $$('.swatch').forEach(b => b.style.pointerEvents = locked ? 'none' : '');
        // Tab buttons
        $$('.tab-btn').forEach(b => b.disabled = locked);
        // Top-level inputs
        newLabelInput.disabled = locked;
        setNameInput.disabled = locked;
        // Set chip interactions
        $$('.set-chip-name').forEach(b => b.style.pointerEvents = locked ? 'none' : '');
        $$('.set-chip-del').forEach(b => b.disabled = locked);
        // Settings controls
        $$('#tab-settings input, #tab-settings select').forEach(b => b.disabled = locked);
        // Share button in the action row
        $('shareBtn') && ($('shareBtn').disabled = locked);
    }
    /* ================================================================
       CANVAS
       ================================================================ */
    function applyWheelSize(size) {
        const s = Math.max(100, Math.min(size, 800));
        const wrap = canvas.parentElement;
        wrap.style.width  = s + 'px';
        wrap.style.height = s + 'px';
        canvas.width  = s;
        canvas.height = s;
        drawWheel();
    }

    const handleResize = debounce(() => {
        const wrap = canvas.parentElement;
        const maxSize = state.cfg.wheelSize ?? 440;
        const s = Math.min(wrap.parentElement.clientWidth, maxSize);
        if (canvas.width !== s) {
            wrap.style.width  = s + 'px';
            wrap.style.height = s + 'px';
            canvas.width  = s;
            canvas.height = s;
        }
        drawWheel();
    }, 100);

    window.addEventListener('resize', handleResize);

    /* ── Drawing ──────────────────────────────────────────────────── */
    function drawWheel() {
        const S  = canvas.width;
        const cx = S / 2;
        const cy = S / 2;
        const r  = S / 2 - 5;

        ctx.clearRect(0, 0, S, S);

        const active = activeEntries();

        if (active.length === 0) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, TWO_PI);
            ctx.fillStyle = '#0f3460';
            ctx.fill();
            ctx.fillStyle = '#8888aa';
            ctx.font = `bold ${S * 0.048}px Segoe UI, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(state.entries.length === 0 ? 'Add entries to spin!' : 'All entries are disabled!', cx, cy);
            ctx.restore();
            return;
        }

        const slices     = buildSlices();
        const showLabels = state.cfg.showLabels;
        const flagAction = state.cfg.action === 'flag';
        const lastWId    = state.lastWinnerId;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(state.rotation);
        ctx.translate(-cx, -cy);

        let fs, maxW;
        if (showLabels) {
            fs   = Math.max(9, Math.min(16, S * 0.034));
            maxW = r * 0.68;
        }

        for (const { entry, startAngle, endAngle, midAngle } of slices) {
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, r, startAngle, endAngle);
            ctx.closePath();
            ctx.fillStyle = (flagAction && entry.id === lastWId) ? lighten(entry.color) : entry.color;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,.1)';
            ctx.lineWidth = 2;
            ctx.stroke();

            if (showLabels) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(midAngle);
                ctx.font = `bold ${fs}px Segoe UI, sans-serif`;
                ctx.fillStyle   = '#fff';
                ctx.textAlign   = 'right';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,.7)';
                ctx.shadowBlur  = 4;
                ctx.fillText(clip(ctx, entry.label, maxW), r - 10, 0);
                ctx.restore();
            }
        }

        ctx.restore();

// Center pin with heart
        const pinR = S * 0.042;
        ctx.beginPath();


        // Draw a small heart on the pin
        const hs = pinR * 0.6;
        ctx.save();
        ctx.translate(cx, cy + 3);
        ctx.beginPath();
        const topY = -hs * 0.6;
        ctx.moveTo(0, hs * 0.7);
        ctx.bezierCurveTo(-hs * 0.1, hs * 0.5, -hs, hs * 0.05, -hs, topY);
        ctx.bezierCurveTo(-hs, topY - hs * 0.6, -hs * 0.5, topY - hs * 0.6, 0, topY - hs * 0.1);
        ctx.bezierCurveTo(hs * 0.5, topY - hs * 0.6, hs, topY - hs * 0.6, hs, topY);
        ctx.bezierCurveTo(hs, hs * 0.05, hs * 0.1, hs * 0.5, 0, hs * 0.7);
        ctx.closePath();
        ctx.fillStyle = '#e71e62';
        ctx.shadowColor = 'rgba(233, 30, 99, 0.6)';
        ctx.shadowBlur = 2;
        ctx.fill();
        ctx.restore();
    }

    function clip(canvasCtx, text, maxWidth) {
        if (canvasCtx.measureText(text).width <= maxWidth) return text;
        let lo = 0, hi = text.length - 1, best = 0;
        while (lo <= hi) {
            const mid = (lo + hi) >>> 1;
            if (canvasCtx.measureText(text.slice(0, mid) + '…').width <= maxWidth) {
                best = mid;
                lo = mid + 1;
            } else {
                hi = mid - 1;
            }
        }
        return text.slice(0, best) + '…';
    }

    function pointerSliceIndex(rotation) {
        const slices = buildSlices();
        if (slices.length === 0) return -1;

        let local = (HALF_PI_NEG - rotation) % TWO_PI;
        if (local < 0) local += TWO_PI;

        for (let i = 0; i < slices.length; i++) {
            let s = slices[i].startAngle % TWO_PI;
            if (s < 0) s += TWO_PI;
            let e = slices[i].endAngle % TWO_PI;
            if (e < 0) e += TWO_PI;

            if (s <= e) {
                if (local >= s && local < e) return i;
            } else {
                if (local >= s || local < e) return i;
            }
        }
        return 0;
    }

    /* ================================================================
       SPIN
       ================================================================ */
    async function spin() {
        const active = activeEntries();
        if (state.spinning || active.length === 0) return;

        state.spinning   = true;
        spinBtn.disabled = true;
        setSpinBtnSmash();
        setUILocked(true);

        if (state.cfg.tickSound) {
            ensureTickBuffer();
            await resumeAudio();
        }

        // Pick winner by weighted random
        const tw = active.reduce((s, e) => s + e.weight, 0);
        let pick = Math.random() * tw;
        let winnerIdx = active.length - 1;
        for (let i = 0; i < active.length; i++) {
            pick -= active[i].weight;
            if (pick <= 0) { winnerIdx = i; break; }
        }
        const winner = active[winnerIdx];
        const winnerSlice = buildSlices()[winnerIdx];

        // Calculate target rotation — land near a border for maximum excitement
        const sliceArc = winnerSlice.endAngle - winnerSlice.startAngle;
        // Pick which border to land near: start or end of the slice
        const nearStart = Math.random() < 0.5;
        // Land within 5–15% of the slice arc from the chosen border (never ON the border)
        const borderOffset = sliceArc * (0.01 + Math.random() * 0.08);
        const targetBodyAngle = nearStart
            ? winnerSlice.startAngle + borderOffset
            : winnerSlice.endAngle   - borderOffset;
        const requiredRotation = HALF_PI_NEG - targetBodyAngle;
        const delta = ((requiredRotation - state.rotation) % TWO_PI + TWO_PI) % TWO_PI;
        const extraSpins = (5 + Math.floor(Math.random() * 6)) * TWO_PI;
        const totalSpin  = delta + extraSpins;

        const startRot = state.rotation;
        const endRot   = startRot + totalSpin;
        const duration = state.cfg.duration * 1000;
        let lastSliceIdx = pointerSliceIndex(state.rotation);

        const easeOut = t => 1 - Math.pow(1 - t, 3);

        // Delay to match smash animation
        await new Promise(r => setTimeout(r, 400));

        buttonClickSound.currentTime = 0;
        buttonClickSound.play().catch(() => {});

        const startTime = performance.now();

        function frame(now) {
            const t = Math.min((now - startTime) / duration, 1);
            state.rotation = startRot + totalSpin * easeOut(t);
            drawWheel();

            const currentSliceIdx = pointerSliceIndex(state.rotation);
            if (currentSliceIdx !== lastSliceIdx) {
                playTick();
                lastSliceIdx = currentSliceIdx;
            }

            if (t < 1) {
                requestAnimationFrame(frame);
                return;
            }

            // Animation complete
            state.rotation   = endRot;
            state.spinning   = false;
            spinBtn.disabled = false;
            resetSpinBtnImage();
            setUILocked(false);

            state.lastWinnerId = winner.id;
            drawWheel();
            logResult(winner);
            openModal(winner);

            const { action } = state.cfg;
            if (action === 'remove') {
                const idx = state.entries.findIndex(e => e.id === winner.id);
                if (idx !== -1) state.entries.splice(idx, 1);
                state.lastWinnerId = null;
            } else if (action === 'disable') {
                winner.disabled = true;
                state.lastWinnerId = null;
            }

            if (action === 'remove' || action === 'disable') {
                invalidateEntryCache();
                saveEntries();
                renderList();
                drawWheel();
            }
        }

        requestAnimationFrame(frame);
    }

    /* ================================================================
       ENTRY LIST RENDERING
       ================================================================ */
    function renderList() {
        invalidateEntryCache();
        const frag = document.createDocumentFragment();

        if (state.entries.length === 0) {
            frag.appendChild(el('li', { className: 'empty-msg', textContent: 'No entries yet.' }));
            entryListEl.replaceChildren(frag);
            drawWheel();
            return;
        }

        for (const entry of state.entries) {
            const li = el('li', {
                className: 'entry-row' + (entry.disabled ? ' disabled-entry' : ''),
            });
            li.dataset.id = entry.id;

            const toggleCb = el('input', {
                type: 'checkbox',
                className: 'entry-toggle',
                checked: !entry.disabled,
                title: entry.disabled ? 'Enable entry' : 'Disable entry',
                onchange() {
                    entry.disabled = !toggleCb.checked;
                    li.classList.toggle('disabled-entry', entry.disabled);
                    invalidateEntryCache();
                    saveEntries();
                    drawWheel();
                },
            });

            const colorInput = el('input', { type: 'color', value: entry.color });
            const swatch = el('div', {
                className: 'swatch',
                title: 'Change colour',
                style: { background: entry.color },
                onclick: () => colorInput.click(),
            });
            colorInput.addEventListener('input', e => {
                entry.color = e.target.value;
                swatch.style.background = entry.color;
                invalidateEntryCache();
                debouncedSaveEntries();
                drawWheel();
            });
            const swatchWrap = el('div', { className: 'swatch-wrap' }, [swatch, colorInput]);

            const labelInput = el('input', {
                type: 'text',
                className: 'entry-label-input',
                value: entry.label,
                title: 'Click to edit',
                maxLength: 80,
                oninput: e => { entry.label = e.target.value; debouncedSaveEntries(); drawWheel(); },
            });

            const weightInput = el('input', {
                type: 'number',
                className: 'weight-input',
                value: entry.weight,
                min: 1, max: 99,
                onchange: e => {
                    const v = parseInt(e.target.value, 10);
                    entry.weight   = isNaN(v) || v < 1 ? 1 : Math.min(v, 99);
                    e.target.value = entry.weight;
                    invalidateEntryCache();
                    saveEntries();
                    drawWheel();
                },
            });
            const weightWrap = el('div', { className: 'weight-wrap' }, [
                el('label', { textContent: 'Wt' }),
                weightInput,
            ]);

            const delBtn = el('button', {
                className: 'entry-del',
                title: 'Remove',
                textContent: '✕',
                onclick: () => {
                    state.entries.splice(state.entries.indexOf(entry), 1);
                    invalidateEntryCache();
                    saveEntries();
                    renderList();
                },
            });

            li.append(toggleCb, swatchWrap, labelInput, weightWrap, delBtn);
            frag.appendChild(li);
        }

        entryListEl.replaceChildren(frag);
        drawWheel();
    }

    /* ================================================================
       SETS RENDERING
       ================================================================ */
    function renderSets() {
        const names = Object.keys(loadSetsMap());

        if (names.length === 0) {
            setsListEl.replaceChildren(setsEmptyEl);
            return;
        }

        const frag = document.createDocumentFragment();
        for (const name of names) {
            frag.appendChild(el('span', { className: 'set-chip' }, [
                el('span', {
                    className: 'set-chip-name',
                    textContent: name,
                    title: `Load "${name}"`,
                    onclick: () => { if (confirm(`Load wheel "${name}"? Current entries will be replaced.`)) loadSet(name); },
                }),
                el('button', {
                    className: 'set-chip-del',
                    title: `Delete wheel "${name}"`,
                    textContent: '✕',
                    onclick: () => { if (confirm(`Delete wheel "${name}"?`)) deleteSet(name); },
                }),
            ]));
        }
        setsListEl.replaceChildren(frag);
    }

    /* ================================================================
       HELPERS
       ================================================================ */
    function nextColor() { return PALETTE[state.entries.length % PALETTE.length]; }

    function addEntry(label) {
        label = label.trim();
        if (!label) return;
        state.entries.push(mkEntry(label, nextColor()));
        invalidateEntryCache();
        saveEntries();
        renderList();
    }

    /* ── Log ──────────────────────────────────────────────────────── */
    function logResult(entry) {
        state.logCount++;
        $('logEmpty')?.remove();

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        resultLogEl.insertBefore(
            el('li', { className: 'log-item' }, [
                el('span', { className: 'log-num',    textContent: `#${state.logCount}` }),
                el('span', { className: 'log-swatch', style: { background: entry.color } }),
                el('span', { className: 'log-label',  textContent: entry.label }),
                el('span', { className: 'log-time',   textContent: time }),
            ]),
            resultLogEl.firstChild,
        );
    }

    function resetLog() {
        state.logCount = 0;
        resultLogEl.replaceChildren(
            el('li', { className: 'empty-msg', id: 'logEmpty', textContent: 'No results yet — spin the wheel!' })
        );
    }

    /* ── Modals ───────────────────────────────────────────────────── */
    function openModal(entry) {
        modalWinner.textContent      = entry.label;
        modalSwatch.style.background = entry.color;
        modalEl.classList.add('open');
    }

    function closeModal()      { modalEl.classList.remove('open'); }
    function closeShareModal() { shareModalEl.classList.remove('open'); }

    function openShareModal() {
        if (state.entries.length === 0) { alert('No entries to share.'); return; }
        shareUrlInput.value = generateShareUrl();
        shareCopiedMsg.textContent = '';
        shareModalEl.classList.add('open');
        shareUrlInput.select();
    }

    /* ── Share ────────────────────────────────────────────────────── */
    function generateShareUrl() {
        const data = state.entries.map(({ label, color, weight, disabled }) => ({ label, color, weight, disabled }));
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        const url = new URL(window.location.href);
        url.search = '';
        url.hash   = '';
        url.searchParams.set('shared', encoded);
        return url.toString();
    }

    function loadSharedEntries() {
        try {
            const encoded = new URLSearchParams(window.location.search).get('shared');
            if (!encoded) return false;
            const arr = JSON.parse(decodeURIComponent(escape(atob(encoded))));
            if (!Array.isArray(arr) || arr.length === 0) return false;
            state.entries = arr.map(e => mkEntry(
                e.label || 'Entry',
                e.color || PALETTE[state.entries.length % PALETTE.length],
                e.weight ?? 1,
                e.disabled ?? false,
            ));
            invalidateEntryCache();
            saveEntries();
            const cleanUrl = new URL(window.location.href);
            cleanUrl.search = '';
            window.history.replaceState({}, '', cleanUrl.toString());
            return true;
        } catch { return false; }
    }

    /* ================================================================
       TABS
       ================================================================ */
    $$('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            $$('.tab-btn').forEach(b  => b.classList.remove('active'));
            $$('.tab-pane').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            $('tab-' + btn.dataset.tab).classList.add('active');
        });
    });

    /* ================================================================
       EVENT LISTENERS
       ================================================================ */
    spinBtn.addEventListener('click', spin);
    document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); spin(); }
    });

    $('addBtn').addEventListener('click', () => {
        addEntry(newLabelInput.value);
        newLabelInput.value = '';
        newLabelInput.focus();
    });
    newLabelInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') { addEntry(e.target.value); e.target.value = ''; }
    });

    $('shuffleBtn').addEventListener('click', () => {
        for (let i = state.entries.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [state.entries[i], state.entries[j]] = [state.entries[j], state.entries[i]];
        }
        invalidateEntryCache();
        saveEntries();
        renderList();
    });

    $('sortBtn').addEventListener('click', () => {
        state.entries.sort((a, b) => a.label.localeCompare(b.label));
        invalidateEntryCache();
        saveEntries();
        renderList();
    });

    $('enableAllBtn').addEventListener('click', () => {
        state.entries.forEach(e => e.disabled = false);
        invalidateEntryCache();
        saveEntries();
        renderList();
    });

    $('clearBtn').addEventListener('click', () => {
        if (!state.entries.length || !confirm('Remove all entries?')) return;
        state.entries = [];
        invalidateEntryCache();
        saveEntries();
        renderList();
    });

    $('clearLogBtn').addEventListener('click', resetLog);

    // Sets
    $('saveSetBtn').addEventListener('click', () => {
        const name = setNameInput.value.trim();
        if (!name) { setNameInput.focus(); return; }
        if (state.entries.length === 0) { alert('No entries to save.'); return; }
        const map = loadSetsMap();
        if (map[name] && !confirm(`Overwrite set "${name}"?`)) return;
        saveSet(name);
        setNameInput.value = '';
    });
    setNameInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') $('saveSetBtn').click();
    });

    // Settings
    $('cfg-duration').addEventListener('input', e => {
        const v = parseFloat(e.target.value);
        if (v >= 1 && v <= 30) { state.cfg.duration = v; saveCfg(); }
    });
    $('cfg-action').addEventListener('change', e => {
        state.cfg.action = e.target.value;
        saveCfg();
    });
    $('cfg-labels').addEventListener('change', e => {
        state.cfg.showLabels = e.target.checked;
        saveCfg();
        drawWheel();
    });
    $('cfg-wheelsize').addEventListener('change', e => {
        const v = parseInt(e.target.value, 10);
        if (v >= 100 && v <= 800) { state.cfg.wheelSize = v; saveCfg(); applyWheelSize(v); }
    });
    $('cfg-tick').addEventListener('change', e => {
        state.cfg.tickSound = e.target.checked;
        saveCfg();
    });
    $('cfg-tick-vol').addEventListener('input', e => {
        const v = parseInt(e.target.value, 10);
        if (v >= 0 && v <= 100) { state.cfg.tickVolume = v / 100; saveCfg(); }
    });

    // Modals
    $('modalClose').addEventListener('click', closeModal);
    $('modalSpin').addEventListener('click', () => { closeModal(); spin(); });
    modalEl.addEventListener('click', e => { if (e.target === modalEl) closeModal(); });

    $('shareBtn').addEventListener('click', openShareModal);
    $('copyShareBtn').addEventListener('click', () => {
        shareUrlInput.select();
        navigator.clipboard.writeText(shareUrlInput.value).then(() => {
            shareCopiedMsg.textContent = '✅ Copied to clipboard!';
        }).catch(() => {
            document.execCommand('copy');
            shareCopiedMsg.textContent = '✅ Copied!';
        });
    });
    $('shareModalClose').addEventListener('click', closeShareModal);
    shareModalEl.addEventListener('click', e => { if (e.target === shareModalEl) closeShareModal(); });

    /* ================================================================
       BACKGROUND IMAGE SLIDESHOW
       ================================================================ */
    (function initSlideshow() {
        const imageUrls = [
            'img/reel/1000008582.jpg',
            'img/reel/CanaKittyBackgroundWallpaper.png',
            'img/reel/Canaria_1.png',
            'img/reel/skeb_by_qum.png',
        ];

        const wrapper = document.querySelector('.background-image-wrapper');
        const images = [];
        let currentIndex = 0;

        function showImage(imgElement) {
            images.forEach(img => img.classList.remove('active'));
            imgElement.classList.add('active');
        }

        (async () => {
            for (const url of imageUrls) {
                try {
                    await new Promise((resolve, reject) => {
                        const img = new Image();
                        img.onload  = resolve;
                        img.onerror = reject;
                        img.src = url;
                    });
                    const imgEl = el('img', { className: 'background-image', alt: 'Cana', src: url });
                    wrapper.appendChild(imgEl);
                    images.push(imgEl);
                    if (images.length === 1) showImage(imgEl);
                } catch (err) {
                    console.error('Error loading image:', err);
                }
            }
        })();

        setInterval(() => {
            if (images.length > 1 && !document.hidden) {
                currentIndex = (currentIndex + 1) % images.length;
                showImage(images[currentIndex]);
            }
        }, 8000);
    })();

    /* ================================================================
       BUTTERFLY SYSTEM
       ================================================================ */
    (function initButterflies() {
        const random = (min, max) => min + Math.random() * (max - min);

        function createButterfly() {
            const size = random(15, 30);
            const butterfly = el('div', {
                className: 'butterfly',
                style: {
                    top:               `${random(0, window.innerHeight * 0.8)}px`,
                    width:             `${size}px`,
                    height:            `${size * 1.5}px`,
                    animationDuration: `${random(35, 60)}s`,
                },
            }, [
                el('img', { src: 'img/butterfly-static.svg', style: { filter: `hue-rotate(${random(0, 360)}deg)` } }),
            ]);
            document.body.appendChild(butterfly);
            butterfly.addEventListener('animationend', () => butterfly.remove());
        }

        for (let i = 0; i < 3; i++) setTimeout(createButterfly, i * 2000);

        setInterval(() => {
            if (!document.hidden && Math.random() > 0.5) createButterfly();
        }, 4000);
    })();

    /* ================================================================
       INIT
       ================================================================ */
    loadCfg();

    $('cfg-duration').value  = state.cfg.duration;
    $('cfg-action').value    = state.cfg.action;
    $('cfg-labels').checked  = state.cfg.showLabels;
    $('cfg-wheelsize').value = state.cfg.wheelSize;
    $('cfg-tick').checked    = state.cfg.tickSound;
    $('cfg-tick-vol').value  = Math.round(state.cfg.tickVolume * 100);

    if (!loadSharedEntries()) {
        if (!loadEntries()) {
            state.entries = [
                mkEntry('Piwi #1', PALETTE[0]),
                mkEntry('Piwi #2', PALETTE[1]),
                mkEntry('Piwi #3', PALETTE[2]),
                mkEntry('Piwi #4', PALETTE[3]),
                mkEntry('Piwi #5', PALETTE[4]),
            ];
            invalidateEntryCache();
        }
    }

    renderSets();
    applyWheelSize(state.cfg.wheelSize);
    renderList();
</script>
</body>
</html>
